<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Property Listings</title>
    
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">

    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // --- Icon Components (Replacing Lucide Imports with SVGs) ---
        const Building2 = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M6 22V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v18Z"/><path d="M6 12H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2"/><path d="M18 9h2a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2h-2"/><path d="M10 6h4"/><path d="M10 10h4"/><path d="M10 14h4"/><path d="M10 18h4"/></svg>
        );
        const Search = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        );
        const Grid = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="7" height="7" x="3" y="3" rx="1"/><rect width="7" height="7" x="14" y="3" rx="1"/><rect width="7" height="7" x="14" y="14" rx="1"/><rect width="7" height="7" x="3" y="14" rx="1"/></svg>
        );
        const List = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="8" x2="21" y1="6" y2="6"/><line x1="8" x2="21" y1="12" y2="12"/><line x1="8" x2="21" y1="18" y2="18"/><line x1="3" x2="3.01" y1="6" y2="6"/><line x1="3" x2="3.01" y1="12" y2="12"/><line x1="3" x2="3.01" y1="18" y2="18"/></svg>
        );
        const MapPin = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
        );
        const Bed = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M2 4v16"/><path d="M2 8h18a2 2 0 0 1 2 2v10"/><path d="M2 17h20"/><path d="M6 8v9"/></svg>
        );
        const Bath = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M9 6 6.5 3.5a1.5 1.5 0 0 0-1-1.5 1.5 1.5 0 0 1 1-1.5 1.5 1.5 0 0 1 1 1.5 1.5 1.5 0 0 0 1 1.5 1.5 1.5 0 0 1 1 1.5 1.5 1.5 0 0 1 1-1.5c.2 2.8-1.5 3-4.5 3"/><path d="M10 8h.01"/><path d="M2 22v-3a4 4 0 0 1 4-4h14a2 2 0 0 1 2 2v3"/><path d="M20 15v6"/></svg>
        );
        const Star = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        );
        const SlidersHorizontal = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="21" x2="14" y1="4" y2="4"/><line x1="10" x2="3" y1="4" y2="4"/><line x1="21" x2="12" y1="12" y2="12"/><line x1="8" x2="3" y1="12" y2="12"/><line x1="21" x2="16" y1="20" y2="20"/><line x1="12" x2="3" y1="20" y2="20"/><line x1="14" x2="14" y1="2" y2="6"/><line x1="8" x2="8" y1="10" y2="14"/><line x1="16" x2="16" y1="18" y2="22"/></svg>
        );
        const LogOut = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></svg>
        );

        // --- PropertyListings Component ---
        function PropertyListings({ navigateTo, userRole, onLogout }) {
            const [viewMode, setViewMode] = useState('grid');
            const [searchTerm, setSearchTerm] = useState('');
            const [showFilters, setShowFilters] = useState(false);
            const [priceRange, setPriceRange] = useState([0, 100000]);
            const [bedrooms, setBedrooms] = useState('any');
            const [propertyType, setPropertyType] = useState('any');
            const [tenantType, setTenantType] = useState('any');
            const [facilities, setFacilities] = useState([]);

            const properties = [
                {
                    id: 1,
                    title: 'Modern Downtown Apartment',
                    location: 'Dhaka, Gulshan',
                    price: 25000,
                    bedrooms: 3,
                    bathrooms: 2,
                    sqft: 1200,
                    rating: 4.8,
                    reviews: 24,
                    type: 'Apartment',
                    tenantType: 'Family',
                    verified: true,
                    amenities: ['Parking', 'WiFi', 'AC', 'Security'],
                },
                {
                    id: 2,
                    title: 'Luxury Family House',
                    location: 'Dhaka, Dhanmondi',
                    price: 45000,
                    bedrooms: 4,
                    bathrooms: 3,
                    sqft: 2500,
                    rating: 4.9,
                    reviews: 38,
                    type: 'House',
                    tenantType: 'Family',
                    verified: true,
                    amenities: ['Garden', 'Parking', 'WiFi', 'AC', 'Security'],
                },
                {
                    id: 3,
                    title: 'Cozy Studio Apartment',
                    location: 'Dhaka, Banani',
                    price: 15000,
                    bedrooms: 1,
                    bathrooms: 1,
                    sqft: 600,
                    rating: 4.6,
                    reviews: 15,
                    type: 'Studio',
                    tenantType: 'Bachelor',
                    verified: false,
                    amenities: ['WiFi', 'AC'],
                },
                {
                    id: 4,
                    title: 'Spacious Condo',
                    location: 'Dhaka, Gulshan',
                    price: 35000,
                    bedrooms: 3,
                    bathrooms: 2,
                    sqft: 1500,
                    rating: 4.7,
                    reviews: 19,
                    type: 'Condo',
                    tenantType: 'Family',
                    verified: true,
                    amenities: ['Gym', 'Pool', 'Parking', 'WiFi', 'AC'],
                },
                {
                    id: 5,
                    title: 'Budget-Friendly Flat',
                    location: 'Dhaka, Mirpur',
                    price: 12000,
                    bedrooms: 2,
                    bathrooms: 1,
                    sqft: 800,
                    rating: 4.3,
                    reviews: 8,
                    type: 'Apartment',
                    tenantType: 'Bachelor',
                    verified: false,
                    amenities: ['WiFi', 'Parking'],
                },
                {
                    id: 6,
                    title: 'Premium Penthouse',
                    location: 'Dhaka, Banani',
                    price: 75000,
                    bedrooms: 4,
                    bathrooms: 4,
                    sqft: 3000,
                    rating: 5.0,
                    reviews: 42,
                    type: 'Apartment',
                    tenantType: 'Family',
                    verified: true,
                    amenities: ['Rooftop', 'Gym', 'Pool', 'Parking', 'WiFi', 'AC', 'Security'],
                },
            ];

            const filteredProperties = properties.filter((property) => {
                const matchesSearch =
                    property.title.toLowerCase().includes(searchTerm.toLowerCase()) ||
                    property.location.toLowerCase().includes(searchTerm.toLowerCase());
                const matchesPrice = property.price >= priceRange[0] && property.price <= priceRange[1];
                const matchesBedrooms = bedrooms === 'any' || property.bedrooms === parseInt(bedrooms);
                const matchesType = propertyType === 'any' || property.type === propertyType;
                const matchesTenantType = tenantType === 'any' || property.tenantType === tenantType;
                return matchesSearch && matchesPrice && matchesBedrooms && matchesType && matchesTenantType;
            });

            return (
                <div className="min-h-screen bg-gray-50">
                    {/* Header */}
                    <header className="bg-white border-b border-gray-200 sticky top-0 z-10">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
                            <div className="flex items-center justify-between">
                                <button
                                    onClick={() => navigateTo('landing')}
                                    className="flex items-center gap-2"
                                >
                                    <div className="bg-blue-600 p-2 rounded-lg">
                                        <Building2 className="w-6 h-6 text-white" />
                                    </div>
                                    <span className="text-xl text-gray-900">RentEase</span>
                                </button>
                                <div className="flex items-center gap-3">
                                    {userRole !== 'guest' && (
                                        <button
                                            onClick={() =>
                                                navigateTo(userRole === 'tenant' ? 'tenant-dashboard' : 'landlord-dashboard')
                                            }
                                            className="px-4 py-2 text-gray-700 hover:text-blue-600 transition-colors"
                                        >
                                            Dashboard
                                        </button>
                                    )}
                                    {userRole !== 'guest' && (
                                        <button
                                            onClick={onLogout}
                                            className="flex items-center gap-2 px-4 py-2 text-gray-700 hover:text-red-600 transition-colors"
                                        >
                                            <LogOut className="w-5 h-5" />
                                            <span className="hidden sm:inline">Logout</span>
                                        </button>
                                    )}
                                </div>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
                        {/* Search and Filters */}
                        <div className="bg-white rounded-xl border border-gray-200 p-4 mb-6 shadow-sm">
                            <div className="flex flex-col sm:flex-row gap-4">
                                <div className="flex-1 relative">
                                    <Search className="absolute left-3 top-1/2 transform -translate-y-1/2 w-5 h-5 text-gray-400" />
                                    <input
                                        type="text"
                                        placeholder="Search by location or title..."
                                        value={searchTerm}
                                        onChange={(e) => setSearchTerm(e.target.value)}
                                        className="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-600"
                                    />
                                </div>
                                <div className="flex gap-2">
                                    <button
                                        onClick={() => setShowFilters(!showFilters)}
                                        className={`flex items-center gap-2 px-4 py-2 border rounded-lg transition-colors ${
                                            showFilters
                                                ? 'bg-blue-600 text-white border-blue-600'
                                                : 'border-gray-300 text-gray-700 hover:border-blue-600 hover:text-blue-600'
                                        }`}
                                    >
                                        <SlidersHorizontal className="w-5 h-5" />
                                        Filters
                                    </button>
                                    <div className="flex border border-gray-300 rounded-lg overflow-hidden">
                                        <button
                                            onClick={() => setViewMode('grid')}
                                            className={`px-3 py-2 ${
                                                viewMode === 'grid'
                                                    ? 'bg-blue-600 text-white'
                                                    : 'bg-white text-gray-700 hover:bg-gray-50'
                                            }`}
                                        >
                                            <Grid className="w-5 h-5" />
                                        </button>
                                        <button
                                            onClick={() => setViewMode('list')}
                                            className={`px-3 py-2 ${
                                                viewMode === 'list'
                                                    ? 'bg-blue-600 text-white'
                                                    : 'bg-white text-gray-700 hover:bg-gray-50'
                                            }`}
                                        >
                                            <List className="w-5 h-5" />
                                        </button>
                                    </div>
                                </div>
                            </div>

                            {/* Filter Drawer */}
                            {showFilters && (
                                <div className="mt-4 pt-4 border-t border-gray-200">
                                    <div className="grid grid-cols-1 sm:grid-cols-3 gap-4">
                                        <div>
                                            <label className="block text-sm text-gray-700 mb-2">Price Range (৳)</label>
                                            <div className="flex items-center gap-2">
                                                <input
                                                    type="number"
                                                    value={priceRange[0]}
                                                    onChange={(e) => setPriceRange([parseInt(e.target.value) || 0, priceRange[1]])}
                                                    className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-600"
                                                    placeholder="Min"
                                                />
                                                <span className="text-gray-500">-</span>
                                                <input
                                                    type="number"
                                                    value={priceRange[1]}
                                                    onChange={(e) => setPriceRange([priceRange[0], parseInt(e.target.value) || 0])}
                                                    className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-600"
                                                    placeholder="Max"
                                                />
                                            </div>
                                        </div>
                                        <div>
                                            <label className="block text-sm text-gray-700 mb-2">Bedrooms</label>
                                            <select
                                                value={bedrooms}
                                                onChange={(e) => setBedrooms(e.target.value)}
                                                className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-600"
                                            >
                                                <option value="any">Any</option>
                                                <option value="1">1</option>
                                                <option value="2">2</option>
                                                <option value="3">3</option>
                                                <option value="4">4+</option>
                                            </select>
                                        </div>
                                        <div>
                                            <label className="block text-sm text-gray-700 mb-2">Property Type</label>
                                            <select
                                                value={propertyType}
                                                onChange={(e) => setPropertyType(e.target.value)}
                                                className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-600"
                                            >
                                                <option value="any">Any</option>
                                                <option value="Apartment">Apartment</option>
                                                <option value="House">House</option>
                                                <option value="Studio">Studio</option>
                                                <option value="Condo">Condo</option>
                                            </select>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>

                        {/* Results Header */}
                        <div className="mb-6">
                            <p className="text-gray-600">
                                {filteredProperties.length} {filteredProperties.length === 1 ? 'property' : 'properties'} found
                            </p>
                        </div>

                        {/* Properties Grid/List */}
                        {viewMode === 'grid' ? (
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                {filteredProperties.map((property) => (
                                    <div
                                        key={property.id}
                                        onClick={() => window.location.href = `property-details.html?id=${property.id}`}
                                        className="bg-white rounded-xl overflow-hidden shadow-sm hover:shadow-xl transition-all duration-300 cursor-pointer group border border-gray-200"
                                    >
                                        <div className="relative h-48 bg-gradient-to-br from-blue-400 to-blue-600">
                                            <div className="absolute top-4 right-4 bg-white px-3 py-1 rounded-full flex items-center gap-1">
                                                <Star className="w-4 h-4 text-amber-500 fill-amber-500" />
                                                <span className="text-sm text-gray-900">{property.rating}</span>
                                            </div>
                                        </div>
                                        <div className="p-6">
                                            <h3 className="text-lg text-gray-900 mb-2 group-hover:text-blue-600 transition-colors">
                                                {property.title}
                                            </h3>
                                            <div className="flex items-center gap-2 text-gray-600 mb-4">
                                                <MapPin className="w-4 h-4" />
                                                <span className="text-sm">{property.location}</span>
                                            </div>
                                            <div className="flex items-center justify-between text-sm text-gray-600 mb-4 pb-4 border-b border-gray-200">
                                                <span>{property.bedrooms} Beds</span>
                                                <span>{property.bathrooms} Baths</span>
                                                <span>{property.sqft} sqft</span>
                                            </div>
                                            <div className="flex items-center justify-between">
                                                <div>
                                                    <span className="text-2xl text-blue-600">৳{property.price.toLocaleString()}</span>
                                                    <span className="text-gray-600">/mo</span>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        ) : (
                            <div className="space-y-4">
                                {filteredProperties.map((property) => (
                                    <div
                                        key={property.id}
                                        onClick={() => window.location.href = `property-details.html?id=${property.id}`}
                                        className="bg-white rounded-xl border border-gray-200 p-6 shadow-sm hover:shadow-lg transition-all cursor-pointer group"
                                    >
                                        <div className="flex gap-6">
                                            <div className="w-48 h-32 bg-gradient-to-br from-blue-400 to-blue-600 rounded-lg flex-shrink-0" />
                                            <div className="flex-1">
                                                <div className="flex items-start justify-between mb-2">
                                                    <h3 className="text-xl text-gray-900 group-hover:text-blue-600 transition-colors">
                                                        {property.title}
                                                    </h3>
                                                    <div className="flex items-center gap-1 bg-amber-50 px-3 py-1 rounded-full">
                                                        <Star className="w-4 h-4 text-amber-500 fill-amber-500" />
                                                        <span className="text-sm text-gray-900">{property.rating}</span>
                                                    </div>
                                                </div>
                                                <div className="flex items-center gap-2 text-gray-600 mb-4">
                                                    <MapPin className="w-4 h-4" />
                                                    <span>{property.location}</span>
                                                </div>
                                                <div className="flex items-center gap-6 text-sm text-gray-600 mb-4">
                                                    <span className="flex items-center gap-1">
                                                        <Bed className="w-4 h-4" />
                                                        {property.bedrooms} Beds
                                                    </span>
                                                    <span className="flex items-center gap-1">
                                                        <Bath className="w-4 h-4" />
                                                        {property.bathrooms} Baths
                                                    </span>
                                                    <span>{property.sqft} sqft</span>
                                                </div>
                                                <div className="flex items-center justify-between">
                                                    <div className="flex flex-wrap gap-2">
                                                        {property.amenities.slice(0, 3).map((amenity) => (
                                                            <span
                                                                key={amenity}
                                                                className="px-2 py-1 text-xs bg-blue-50 text-blue-700 rounded-full"
                                                            >
                                                                {amenity}
                                                            </span>
                                                        ))}
                                                        {property.amenities.length > 3 && (
                                                            <span className="px-2 py-1 text-xs bg-gray-100 text-gray-600 rounded-full">
                                                                +{property.amenities.length - 3} more
                                                            </span>
                                                        )}
                                                    </div>
                                                    <div>
                                                        <span className="text-2xl text-blue-600">৳{property.price.toLocaleString()}</span>
                                                        <span className="text-gray-600">/mo</span>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {filteredProperties.length === 0 && (
                            <div className="bg-white rounded-xl border border-gray-200 p-12 text-center">
                                <p className="text-gray-500 mb-4">No properties found matching your criteria</p>
                                <button
                                    onClick={() => {
                                        setSearchTerm('');
                                        setPriceRange([0, 100000]);
                                        setBedrooms('any');
                                        setPropertyType('any');
                                    }}
                                    className="text-blue-600 hover:text-blue-700 transition-colors"
                                >
                                    Clear Filters
                                </button>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        // --- App Component (Wrapper) ---
        function App() {
            // Simulated Navigation
            const navigateTo = (view, propertyId) => {
                console.log(`Navigating to: ${view}, Property ID: ${propertyId}`);
                
                if (view === 'property-details') {
                    window.location.href = `property-details.html?id=${propertyId}`;
                } else if(view === 'landing') {
                    window.location.href = 'index.html';
                } 
                else if (view === 'tenant-dashboard') {
                    window.location.href = 'tenant-dashboard.html';
                } 
                else if (view === 'landlord-dashboard') {
                    window.location.href = 'landlord-dashboard.html';
                } 
                else {
                    alert(`Navigation to ${view} triggered!`);
                }
            };

            const handleLogout = () => {
                alert('Logging out...');
                window.location.href = 'index.html';
            };

            // Simulated Role
            const userRole = 'tenant'; 

            return (
                <PropertyListings 
                    navigateTo={navigateTo} 
                    userRole={userRole} 
                    onLogout={handleLogout} 
                />
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
