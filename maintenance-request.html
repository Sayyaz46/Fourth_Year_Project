<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maintenance Request</title>
    
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">

    <div id="root"></div>

    <script type="text/babel">
        // --- Icons (Replacing Lucide Imports) ---
        const ChevronLeft = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m15 18-6-6 6-6"/></svg>
        );
        const CheckCircle = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
        );
        const Camera = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>
        );

        // --- Maintenance Request Component ---
        function MaintenanceRequest() {
            // Using React hooks from global React object
            const [submitted, setSubmitted] = React.useState(false);
            const [formData, setFormData] = React.useState({
                property: 'Modern Downtown Apartment',
                issue: '',
                priority: 'medium',
                description: '',
                photos: [],
            });

            // Navigation handler to go back to dashboard
            const handleNavigation = () => {
                window.location.href = 'tenant-dashboard.html';
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                setSubmitted(true);
                // In a real app, you would send data to a server here
                console.log('Form Submitted:', formData);
            };

            return (
                <div className="min-h-screen bg-gray-50">
                    {/* Header */}
                    <header className="bg-white border-b border-gray-200 sticky top-0 z-10">
                        <div className="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
                            <button
                                onClick={handleNavigation}
                                className="flex items-center gap-2 text-gray-700 hover:text-blue-600 transition-colors"
                            >
                                <ChevronLeft className="w-5 h-5" />
                                <span>Back to Dashboard</span>
                            </button>
                        </div>
                    </header>

                    <main className="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
                        {!submitted ? (
                            <div className="bg-white rounded-xl border border-gray-200 p-8 shadow-sm">
                                <h2 className="text-2xl text-gray-900 mb-6">Submit Maintenance Request</h2>
                                <form onSubmit={handleSubmit} className="space-y-6">
                                    <div>
                                        <label className="block text-gray-700 mb-2">Property</label>
                                        <select
                                            value={formData.property}
                                            onChange={(e) =>
                                                setFormData({ ...formData, property: e.target.value })
                                            }
                                            className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-600"
                                        >
                                            <option value="Modern Downtown Apartment">Modern Downtown Apartment</option>
                                            <option value="Luxury Family House">Luxury Family House</option>
                                            <option value="Cozy Studio">Cozy Studio</option>
                                        </select>
                                    </div>

                                    <div>
                                        <label className="block text-gray-700 mb-2">Issue Type *</label>
                                        <select
                                            value={formData.issue}
                                            onChange={(e) => setFormData({ ...formData, issue: e.target.value })}
                                            className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-600"
                                            required
                                        >
                                            <option value="">Select an issue</option>
                                            <option value="Plumbing">Plumbing</option>
                                            <option value="Electrical">Electrical</option>
                                            <option value="AC/Heating">AC/Heating</option>
                                            <option value="Appliance">Appliance</option>
                                            <option value="Structural">Structural</option>
                                            <option value="Pest Control">Pest Control</option>
                                            <option value="Other">Other</option>
                                        </select>
                                    </div>

                                    <div>
                                        <label className="block text-gray-700 mb-2">Priority *</label>
                                        <div className="grid grid-cols-3 gap-4">
                                            <button
                                                type="button"
                                                onClick={() => setFormData({ ...formData, priority: 'low' })}
                                                className={`p-4 border-2 rounded-lg transition-all ${
                                                    formData.priority === 'low'
                                                        ? 'border-green-600 bg-green-50'
                                                        : 'border-gray-200 hover:border-gray-300'
                                                }`}
                                            >
                                                <div
                                                    className={`text-center ${
                                                        formData.priority === 'low' ? 'text-green-600' : 'text-gray-600'
                                                    }`}
                                                >
                                                    <div className="text-lg mb-1">Low</div>
                                                    <div className="text-xs">Can wait</div>
                                                </div>
                                            </button>
                                            <button
                                                type="button"
                                                onClick={() => setFormData({ ...formData, priority: 'medium' })}
                                                className={`p-4 border-2 rounded-lg transition-all ${
                                                    formData.priority === 'medium'
                                                        ? 'border-yellow-600 bg-yellow-50'
                                                        : 'border-gray-200 hover:border-gray-300'
                                                }`}
                                            >
                                                <div
                                                    className={`text-center ${
                                                        formData.priority === 'medium' ? 'text-yellow-600' : 'text-gray-600'
                                                    }`}
                                                >
                                                    <div className="text-lg mb-1">Medium</div>
                                                    <div className="text-xs">Few days</div>
                                                </div>
                                            </button>
                                            <button
                                                type="button"
                                                onClick={() => setFormData({ ...formData, priority: 'high' })}
                                                className={`p-4 border-2 rounded-lg transition-all ${
                                                    formData.priority === 'high'
                                                        ? 'border-red-600 bg-red-50'
                                                        : 'border-gray-200 hover:border-gray-300'
                                                }`}
                                            >
                                                <div
                                                    className={`text-center ${
                                                        formData.priority === 'high' ? 'text-red-600' : 'text-gray-600'
                                                    }`}
                                                >
                                                    <div className="text-lg mb-1">High</div>
                                                    <div className="text-xs">Urgent</div>
                                                </div>
                                            </button>
                                        </div>
                                    </div>

                                    <div>
                                        <label className="block text-gray-700 mb-2">Description *</label>
                                        <textarea
                                            value={formData.description}
                                            onChange={(e) =>
                                                setFormData({ ...formData, description: e.target.value })
                                            }
                                            rows={6}
                                            placeholder="Please describe the issue in detail..."
                                            className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-600 resize-none"
                                            required
                                        />
                                    </div>

                                    <div>
                                        <label className="block text-gray-700 mb-2">Upload Photos</label>
                                        <div className="border-2 border-dashed border-gray-300 rounded-lg p-8 text-center hover:border-blue-600 transition-colors cursor-pointer">
                                            <Camera className="w-12 h-12 text-gray-400 mx-auto mb-2" />
                                            <p className="text-gray-600 mb-1">Click to upload or drag and drop</p>
                                            <p className="text-sm text-gray-500">
                                                Photos help us understand the issue better (JPG, PNG)
                                            </p>
                                        </div>
                                    </div>

                                    <div className="bg-blue-50 border border-blue-200 rounded-lg p-4">
                                        <p className="text-sm text-blue-800">
                                            <strong>Note:</strong> Emergency issues (gas leaks, floods, security) should be
                                            reported immediately by calling our emergency hotline: +880 1XXX-XXXXXX
                                        </p>
                                    </div>

                                    <button
                                        type="submit"
                                        className="w-full bg-blue-600 text-white py-3 px-6 rounded-lg hover:bg-blue-700 transition-colors"
                                    >
                                        Submit Request
                                    </button>
                                </form>
                            </div>
                        ) : (
                            <div className="bg-white rounded-xl border border-gray-200 p-8 shadow-sm text-center">
                                <div className="bg-green-100 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-6">
                                    <CheckCircle className="w-12 h-12 text-green-600" />
                                </div>
                                <h2 className="text-2xl text-gray-900 mb-4">Request Submitted!</h2>
                                <p className="text-gray-600 mb-8 max-w-md mx-auto">
                                    Your maintenance request has been submitted successfully. We'll review it and assign
                                    a technician shortly.
                                </p>

                                {/* Request Details */}
                                <div className="bg-gray-50 rounded-lg p-6 mb-8 text-left">
                                    <h3 className="text-lg text-gray-900 mb-4">Request Details</h3>
                                    <div className="space-y-2 text-sm">
                                        <div className="flex justify-between">
                                            <span className="text-gray-600">Request ID</span>
                                            <span className="text-gray-900">MNT-{Math.floor(Math.random() * 10000)}</span>
                                        </div>
                                        <div className="flex justify-between">
                                            <span className="text-gray-600">Property</span>
                                            <span className="text-gray-900">{formData.property}</span>
                                        </div>
                                        <div className="flex justify-between">
                                            <span className="text-gray-600">Issue</span>
                                            <span className="text-gray-900">{formData.issue}</span>
                                        </div>
                                        <div className="flex justify-between">
                                            <span className="text-gray-600">Priority</span>
                                            <span
                                                className={`px-2 py-1 text-xs rounded-full ${
                                                    formData.priority === 'high'
                                                        ? 'bg-red-100 text-red-800'
                                                        : formData.priority === 'medium'
                                                        ? 'bg-yellow-100 text-yellow-800'
                                                        : 'bg-green-100 text-green-800'
                                                }`}
                                            >
                                                {formData.priority.charAt(0).toUpperCase() + formData.priority.slice(1)}
                                            </span>
                                        </div>
                                        <div className="flex justify-between">
                                            <span className="text-gray-600">Status</span>
                                            <span className="px-2 py-1 text-xs bg-yellow-100 text-yellow-800 rounded-full">
                                                Open
                                            </span>
                                        </div>
                                    </div>
                                </div>

                                {/* Status Tracking */}
                                <div className="bg-blue-50 rounded-lg p-6 mb-8">
                                    <h3 className="text-lg text-gray-900 mb-4">What happens next?</h3>
                                    <div className="space-y-4 text-left">
                                        <div className="flex items-start gap-3">
                                            <div className="bg-blue-600 text-white w-6 h-6 rounded-full flex items-center justify-center text-sm flex-shrink-0 mt-0.5">
                                                1
                                            </div>
                                            <div>
                                                <p className="text-gray-900">Request Review</p>
                                                <p className="text-sm text-gray-600">
                                                    Our team will review your request within 2 hours
                                                </p>
                                            </div>
                                        </div>
                                        <div className="flex items-start gap-3">
                                            <div className="bg-gray-300 text-gray-600 w-6 h-6 rounded-full flex items-center justify-center text-sm flex-shrink-0 mt-0.5">
                                                2
                                            </div>
                                            <div>
                                                <p className="text-gray-900">Technician Assignment</p>
                                                <p className="text-sm text-gray-600">
                                                    A qualified technician will be assigned
                                                </p>
                                            </div>
                                        </div>
                                        <div className="flex items-start gap-3">
                                            <div className="bg-gray-300 text-gray-600 w-6 h-6 rounded-full flex items-center justify-center text-sm flex-shrink-0 mt-0.5">
                                                3
                                            </div>
                                            <div>
                                                <p className="text-gray-900">Schedule Visit</p>
                                                <p className="text-sm text-gray-600">
                                                    We'll contact you to schedule a convenient time
                                                </p>
                                            </div>
                                        </div>
                                        <div className="flex items-start gap-3">
                                            <div className="bg-gray-300 text-gray-600 w-6 h-6 rounded-full flex items-center justify-center text-sm flex-shrink-0 mt-0.5">
                                                4
                                            </div>
                                            <div>
                                                <p className="text-gray-900">Issue Resolved</p>
                                                <p className="text-sm text-gray-600">
                                                    The technician will fix the issue and mark it complete
                                                </p>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <div className="flex gap-4">
                                    <button
                                        onClick={() => setSubmitted(false)}
                                        className="flex-1 border border-gray-300 text-gray-700 py-3 px-6 rounded-lg hover:bg-gray-50 transition-colors"
                                    >
                                        Submit Another Request
                                    </button>
                                    <button
                                        onClick={handleNavigation}
                                        className="flex-1 bg-blue-600 text-white py-3 px-6 rounded-lg hover:bg-blue-700 transition-colors"
                                    >
                                        Back to Dashboard
                                    </button>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<MaintenanceRequest />);
    </script>
</body>
</html>
