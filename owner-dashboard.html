<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Owner Dashboard - RentEase</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50">
  <div id="root"></div>

  <script type="text/babel">
    const { useEffect, useMemo, useState } = React;

    const API_URL = "http://localhost:5000/api/owner";
    const storedUser = (() => {
      try {
        return JSON.parse(localStorage.getItem("user"));
      } catch (error) {
        return null;
      }
    })();

    const isOwnerSession = storedUser && storedUser.role === "owner" && storedUser.token;

    if (!isOwnerSession) {
      window.location.href = "login.html";
    }

    const emptyPropertyForm = {
      title: "",
      address: "",
      location: "",
      description: "",
      rent: "",
      bedrooms: "1",
      bathrooms: "1",
      sqft: "",
      propertyType: "Apartment",
      tenantType: "Any",
      amenities: "",
      images: [],
      status: "available"
    };

    const money = (value) => `BDT ${Number(value || 0).toLocaleString("en-BD")}`;
    const formatDate = (value) => value ? new Date(value).toLocaleDateString("en-BD") : "Not set";

    const Icon = ({ children, className = "w-5 h-5" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        {children}
      </svg>
    );

    const BuildingIcon = ({ className }) => (
      <Icon className={className}><path d="M6 22V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v18"/><path d="M6 12H4a2 2 0 0 0-2 2v8h20V11a2 2 0 0 0-2-2h-2"/><path d="M10 6h4"/><path d="M10 10h4"/><path d="M10 14h4"/></Icon>
    );
    const CalendarIcon = ({ className }) => (
      <Icon className={className}><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4"/><path d="M8 2v4"/><path d="M3 10h18"/></Icon>
    );
    const CreditCardIcon = ({ className }) => (
      <Icon className={className}><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/></Icon>
    );
    const WrenchIcon = ({ className }) => (
      <Icon className={className}><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.3-3.3a6 6 0 0 1-7.9 7.9l-6.6 6.6a2.1 2.1 0 0 1-3-3l6.6-6.6a6 6 0 0 1 7.9-7.9l-3.3 3.3z"/></Icon>
    );
    const PlusIcon = ({ className }) => (
      <Icon className={className}><path d="M12 5v14"/><path d="M5 12h14"/></Icon>
    );
    const PencilIcon = ({ className }) => (
      <Icon className={className}><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z"/></Icon>
    );
    const TrashIcon = ({ className }) => (
      <Icon className={className}><path d="M3 6h18"/><path d="M8 6V4h8v2"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></Icon>
    );
    const EyeIcon = ({ className }) => (
      <Icon className={className}><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></Icon>
    );
    const LogOutIcon = ({ className }) => (
      <Icon className={className}><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/></Icon>
    );
    const MessageSquareIcon = ({ className }) => (
      <Icon className={className}><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></Icon>
    );

    function StatusBadge({ status }) {
      const normalized = String(status || "pending").toLowerCase();
      const classes = {
        available: "bg-emerald-50 text-emerald-700 border-emerald-200",
        occupied: "bg-blue-50 text-blue-700 border-blue-200",
        maintenance: "bg-amber-50 text-amber-700 border-amber-200",
        inactive: "bg-slate-100 text-slate-700 border-slate-200",
        pending: "bg-amber-50 text-amber-700 border-amber-200",
        approved: "bg-emerald-50 text-emerald-700 border-emerald-200",
        paid: "bg-emerald-50 text-emerald-700 border-emerald-200",
        rejected: "bg-rose-50 text-rose-700 border-rose-200",
        cancelled: "bg-slate-100 text-slate-700 border-slate-200",
        "in progress": "bg-amber-50 text-amber-700 border-amber-200",
        resolved: "bg-emerald-50 text-emerald-700 border-emerald-200"
      };
      const label = String(status || "Pending").replace(/^\w/, (char) => char.toUpperCase());

      return (
        <span className={`inline-flex items-center rounded-full border px-2.5 py-1 text-xs font-medium ${classes[normalized] || "bg-slate-100 text-slate-700 border-slate-200"}`}>
          {label}
        </span>
      );
    }

    function OwnerDashboard() {
      const [activeTab, setActiveTab] = useState("properties");
      const [stats, setStats] = useState({});
      const [properties, setProperties] = useState([]);
      const [bookings, setBookings] = useState([]);
      const [payments, setPayments] = useState([]);
      const [maintenance, setMaintenance] = useState([]);
      const [messages, setMessages] = useState([]);
      const [replyDrafts, setReplyDrafts] = useState({});
      const [form, setForm] = useState(emptyPropertyForm);
      const [editingId, setEditingId] = useState(null);
      const [viewingProperty, setViewingProperty] = useState(null);
      const [loading, setLoading] = useState(true);
      const [saving, setSaving] = useState(false);
      const [message, setMessage] = useState("");
      const [error, setError] = useState("");

      const authHeaders = useMemo(() => ({
        "Content-Type": "application/json",
        Authorization: `Bearer ${storedUser.token}`
      }), []);

      const apiFetch = async (path, options = {}) => {
        const response = await fetch(`${API_URL}${path}`, {
          ...options,
          headers: {
            ...authHeaders,
            ...(options.headers || {})
          }
        });

        const data = await response.json().catch(() => ({}));

        if (!response.ok) {
          throw new Error(data.message || "Request failed");
        }

        return data;
      };

      const loadDashboard = async () => {
        try {
          setLoading(true);
          setError("");
          const data = await apiFetch("/dashboard");
          setStats(data.stats || {});
          setProperties(data.properties || []);
          setBookings(data.bookings || []);
          setPayments(data.payments || []);
          setMaintenance(data.maintenance || []);
          setMessages(data.messages || []);
        } catch (err) {
          setError(err.message);
        } finally {
          setLoading(false);
        }
      };

      useEffect(() => {
        loadDashboard();
      }, []);

      const updateForm = (field, value) => {
        setForm((current) => ({ ...current, [field]: value }));
      };

      const handleFiles = async (event) => {
        const files = Array.from(event.target.files || []);
        if (!files.length) return;

        const readers = files.map((file) => new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(reader.result);
          reader.onerror = reject;
          reader.readAsDataURL(file);
        }));

        const images = await Promise.all(readers);
        setForm((current) => ({ ...current, images: [...current.images, ...images] }));
        event.target.value = "";
      };

      const removeImage = (index) => {
        setForm((current) => ({
          ...current,
          images: current.images.filter((_, imageIndex) => imageIndex !== index)
        }));
      };

      const resetForm = () => {
        setForm(emptyPropertyForm);
        setEditingId(null);
      };

      const submitProperty = async (event) => {
        event.preventDefault();

        const payload = {
          ...form,
          rent: Number(form.rent),
          bedrooms: Number(form.bedrooms),
          bathrooms: Number(form.bathrooms),
          sqft: Number(form.sqft || 0)
        };

        try {
          setSaving(true);
          setError("");
          if (editingId) {
            await apiFetch(`/properties/${editingId}`, {
              method: "PUT",
              body: JSON.stringify(payload)
            });
            setMessage("Property updated.");
          } else {
            await apiFetch("/properties", {
              method: "POST",
              body: JSON.stringify(payload)
            });
            setMessage("Property added.");
          }
          resetForm();
          await loadDashboard();
        } catch (err) {
          setError(err.message);
        } finally {
          setSaving(false);
        }
      };

      const editProperty = (property) => {
        setEditingId(property._id);
        setForm({
          title: property.title || "",
          address: property.address || "",
          location: property.location || "",
          description: property.description || "",
          rent: property.rent || "",
          bedrooms: property.bedrooms || "1",
          bathrooms: property.bathrooms || "1",
          sqft: property.sqft || "",
          propertyType: property.propertyType || "Apartment",
          tenantType: property.tenantType || "Any",
          amenities: (property.amenities || []).join(", "),
          images: property.images || [],
          status: property.status || "available"
        });
        setActiveTab("properties");
        window.scrollTo({ top: 0, behavior: "smooth" });
      };

      const deleteProperty = async (propertyId) => {
        if (!confirm("Delete this property?")) return;

        try {
          setError("");
          await apiFetch(`/properties/${propertyId}`, { method: "DELETE" });
          setMessage("Property deleted.");
          await loadDashboard();
        } catch (err) {
          setError(err.message);
        }
      };

      const updateBooking = async (bookingId, status) => {
        try {
          setError("");
          await apiFetch(`/bookings/${bookingId}/status`, {
            method: "PATCH",
            body: JSON.stringify({ status })
          });
          setMessage(`Booking ${status}.`);
          await loadDashboard();
        } catch (err) {
          setError(err.message);
        }
      };

      const updateMaintenance = async (requestId, status) => {
        try {
          setError("");
          await apiFetch(`/maintenance/${requestId}/status`, {
            method: "PATCH",
            body: JSON.stringify({ status })
          });
          setMessage("Maintenance request updated.");
          await loadDashboard();
        } catch (err) {
          setError(err.message);
        }
      };

      const updateReplyDraft = (threadKey, value) => {
        setReplyDrafts((current) => ({ ...current, [threadKey]: value }));
      };

      const sendOwnerMessage = async (thread) => {
        const body = (replyDrafts[thread.key] || "").trim();
        if (!body) return;

        try {
          setError("");
          await apiFetch("/messages", {
            method: "POST",
            body: JSON.stringify({
              tenantId: thread.tenant?._id,
              propertyId: thread.property?._id,
              body
            })
          });
          setReplyDrafts((current) => ({ ...current, [thread.key]: "" }));
          setMessage("Message sent.");
          await loadDashboard();
        } catch (err) {
          setError(err.message);
        }
      };

      const logout = () => {
        localStorage.removeItem("user");
        window.location.href = "login.html";
      };

      const statCards = [
        { label: "Owned Properties", value: stats.totalProperties || 0, icon: BuildingIcon, color: "text-blue-700 bg-blue-50" },
        { label: "Occupied", value: stats.occupiedProperties || 0, icon: BuildingIcon, color: "text-emerald-700 bg-emerald-50" },
        { label: "Pending Bookings", value: stats.pendingBookings || 0, icon: CalendarIcon, color: "text-amber-700 bg-amber-50" },
        { label: "Open Maintenance", value: stats.openMaintenance || 0, icon: WrenchIcon, color: "text-rose-700 bg-rose-50" },
        { label: "Collected Rent", value: money(stats.totalCollected), icon: CreditCardIcon, color: "text-violet-700 bg-violet-50" }
      ];

      const messageThreads = useMemo(() => {
        const threads = new Map();

        messages.forEach((item) => {
          const tenantId = item.tenant?._id || item.tenant || "tenant";
          const propertyId = item.property?._id || "general";
          const key = `${tenantId}-${propertyId}`;

          if (!threads.has(key)) {
            threads.set(key, {
              key,
              tenant: item.tenant,
              property: item.property,
              messages: []
            });
          }

          threads.get(key).messages.push(item);
        });

        return Array.from(threads.values())
          .map((thread) => ({
            ...thread,
            messages: [...thread.messages].sort((a, b) => new Date(a.createdAt) - new Date(b.createdAt))
          }))
          .sort((a, b) => {
            const latestA = a.messages[a.messages.length - 1]?.createdAt || 0;
            const latestB = b.messages[b.messages.length - 1]?.createdAt || 0;
            return new Date(latestB) - new Date(latestA);
          });
      }, [messages]);

      if (loading) {
        return (
          <div className="min-h-screen flex items-center justify-center text-slate-700">
            Loading owner dashboard...
          </div>
        );
      }

      return (
        <div className="min-h-screen">
          <header className="sticky top-0 z-20 border-b border-slate-200 bg-white">
            <div className="mx-auto flex max-w-7xl items-center justify-between px-4 py-4 sm:px-6 lg:px-8">
              <div className="flex items-center gap-3">
                <div className="rounded-lg bg-blue-600 p-2 text-white">
                  <BuildingIcon className="h-6 w-6" />
                </div>
                <div>
                  <h1 className="text-xl font-semibold text-slate-950">Owner Dashboard</h1>
                  <p className="text-sm text-slate-600">Welcome, {storedUser.name}</p>
                </div>
              </div>
              <div className="flex items-center gap-2">
               <button
    onClick={() => {
        window.location.href = "index.html";
    }}
    className="hidden rounded-lg border border-slate-300 px-3 py-2 text-sm font-medium text-slate-700 hover:border-blue-600 hover:text-blue-700 sm:inline-flex"
>
    Browse Properties
</button>
                <button
                  onClick={logout}
                  className="inline-flex items-center gap-2 rounded-lg px-3 py-2 text-sm font-medium text-slate-700 hover:bg-rose-50 hover:text-rose-700"
                >
                  <LogOutIcon className="h-5 w-5" />
                  <span className="hidden sm:inline">Logout</span>
                </button>
              </div>
            </div>
          </header>

          <main className="mx-auto max-w-7xl px-4 py-6 sm:px-6 lg:px-8">
            {(error || message) && (
              <div className={`mb-4 rounded-lg border px-4 py-3 text-sm ${error ? "border-rose-200 bg-rose-50 text-rose-700" : "border-emerald-200 bg-emerald-50 text-emerald-700"}`}>
                {error || message}
              </div>
            )}

            <section className="mb-6 grid grid-cols-1 gap-4 sm:grid-cols-2 lg:grid-cols-5">
              {statCards.map((item) => {
                const CardIcon = item.icon;
                return (
                  <div key={item.label} className="rounded-lg border border-slate-200 bg-white p-4">
                    <div className={`mb-3 inline-flex rounded-lg p-2 ${item.color}`}>
                      <CardIcon className="h-5 w-5" />
                    </div>
                    <p className="text-sm text-slate-600">{item.label}</p>
                    <p className="mt-1 text-2xl font-semibold text-slate-950">{item.value}</p>
                  </div>
                );
              })}
            </section>

            <nav className="mb-6 flex flex-wrap gap-2 rounded-lg border border-slate-200 bg-white p-2">
              {[
                ["properties", "Properties", BuildingIcon],
                ["bookings", "Booking Requests", CalendarIcon],
                ["payments", "Rent Payments", CreditCardIcon],
                ["maintenance", "Maintenance", WrenchIcon],
                ["messages", "Messages", MessageSquareIcon]
              ].map(([id, label, TabIcon]) => (
                <button
                  key={id}
                  onClick={() => setActiveTab(id)}
                  className={`inline-flex items-center gap-2 rounded-lg px-3 py-2 text-sm font-medium ${activeTab === id ? "bg-blue-600 text-white" : "text-slate-700 hover:bg-slate-100"}`}
                >
                  <TabIcon className="h-4 w-4" />
                  {label}
                </button>
              ))}
            </nav>

            {activeTab === "properties" && (
              <section className="grid grid-cols-1 gap-6 lg:grid-cols-5">
                <form onSubmit={submitProperty} className="rounded-lg border border-slate-200 bg-white p-5 lg:col-span-2">
                  <div className="mb-4 flex items-center justify-between gap-3">
                    <h2 className="text-lg font-semibold text-slate-950">{editingId ? "Edit Property" : "Add Property"}</h2>
                    {editingId && (
                      <button type="button" onClick={resetForm} className="text-sm font-medium text-slate-600 hover:text-blue-700">
                        Cancel
                      </button>
                    )}
                  </div>

                  <div className="space-y-4">
                    <div>
                      <label className="mb-1 block text-sm font-medium text-slate-700">Title</label>
                      <input required value={form.title} onChange={(e) => updateForm("title", e.target.value)} className="w-full rounded-lg border border-slate-300 px-3 py-2 focus:border-blue-600 focus:outline-none" placeholder="Modern family apartment" />
                    </div>
                    <div>
                      <label className="mb-1 block text-sm font-medium text-slate-700">Address</label>
                      <input required value={form.address} onChange={(e) => updateForm("address", e.target.value)} className="w-full rounded-lg border border-slate-300 px-3 py-2 focus:border-blue-600 focus:outline-none" placeholder="House 12, Road 3, Sylhet" />
                    </div>
                    <div className="grid grid-cols-1 gap-3 sm:grid-cols-2">
                      <div>
                        <label className="mb-1 block text-sm font-medium text-slate-700">Location</label>
                        <input value={form.location} onChange={(e) => updateForm("location", e.target.value)} className="w-full rounded-lg border border-slate-300 px-3 py-2 focus:border-blue-600 focus:outline-none" placeholder="Zindabazar" />
                      </div>
                      <div>
                        <label className="mb-1 block text-sm font-medium text-slate-700">Rent</label>
                        <input required type="number" min="0" value={form.rent} onChange={(e) => updateForm("rent", e.target.value)} className="w-full rounded-lg border border-slate-300 px-3 py-2 focus:border-blue-600 focus:outline-none" placeholder="25000" />
                      </div>
                    </div>
                    <div className="grid grid-cols-3 gap-3">
                      <div>
                        <label className="mb-1 block text-sm font-medium text-slate-700">Beds</label>
                        <input type="number" min="0" value={form.bedrooms} onChange={(e) => updateForm("bedrooms", e.target.value)} className="w-full rounded-lg border border-slate-300 px-3 py-2 focus:border-blue-600 focus:outline-none" />
                      </div>
                      <div>
                        <label className="mb-1 block text-sm font-medium text-slate-700">Baths</label>
                        <input type="number" min="0" value={form.bathrooms} onChange={(e) => updateForm("bathrooms", e.target.value)} className="w-full rounded-lg border border-slate-300 px-3 py-2 focus:border-blue-600 focus:outline-none" />
                      </div>
                      <div>
                        <label className="mb-1 block text-sm font-medium text-slate-700">Sqft</label>
                        <input type="number" min="0" value={form.sqft} onChange={(e) => updateForm("sqft", e.target.value)} className="w-full rounded-lg border border-slate-300 px-3 py-2 focus:border-blue-600 focus:outline-none" />
                      </div>
                    </div>
                    <div className="grid grid-cols-1 gap-3 sm:grid-cols-3">
                      <div>
                        <label className="mb-1 block text-sm font-medium text-slate-700">Type</label>
                        <select value={form.propertyType} onChange={(e) => updateForm("propertyType", e.target.value)} className="w-full rounded-lg border border-slate-300 px-3 py-2 focus:border-blue-600 focus:outline-none">
                          <option>Apartment</option>
                          <option>House</option>
                          <option>Studio</option>
                          <option>Sublet</option>
                        </select>
                      </div>
                      <div>
                        <label className="mb-1 block text-sm font-medium text-slate-700">Tenant</label>
                        <select value={form.tenantType} onChange={(e) => updateForm("tenantType", e.target.value)} className="w-full rounded-lg border border-slate-300 px-3 py-2 focus:border-blue-600 focus:outline-none">
                          <option>Any</option>
                          <option>Family</option>
                          <option>Bachelor</option>
                          <option>Student</option>
                        </select>
                      </div>
                      <div>
                        <label className="mb-1 block text-sm font-medium text-slate-700">Status</label>
                        <select value={form.status} onChange={(e) => updateForm("status", e.target.value)} className="w-full rounded-lg border border-slate-300 px-3 py-2 focus:border-blue-600 focus:outline-none">
                          <option value="available">Available</option>
                          <option value="occupied">Occupied</option>
                          <option value="maintenance">Maintenance</option>
                          <option value="inactive">Inactive</option>
                        </select>
                      </div>
                    </div>
                    <div>
                      <label className="mb-1 block text-sm font-medium text-slate-700">Amenities</label>
                      <input value={form.amenities} onChange={(e) => updateForm("amenities", e.target.value)} className="w-full rounded-lg border border-slate-300 px-3 py-2 focus:border-blue-600 focus:outline-none" placeholder="Parking, AC, WiFi" />
                    </div>
                    <div>
                      <label className="mb-1 block text-sm font-medium text-slate-700">Description</label>
                      <textarea rows="4" value={form.description} onChange={(e) => updateForm("description", e.target.value)} className="w-full resize-none rounded-lg border border-slate-300 px-3 py-2 focus:border-blue-600 focus:outline-none" placeholder="Add useful property details for tenants." />
                    </div>
                    <div>
                      <label className="mb-2 block text-sm font-medium text-slate-700">Property Images</label>
                      <label className="flex cursor-pointer items-center justify-center gap-2 rounded-lg border border-dashed border-slate-300 bg-slate-50 px-3 py-4 text-sm font-medium text-slate-700 hover:border-blue-600 hover:text-blue-700">
                        <PlusIcon className="h-4 w-4" />
                        Upload images
                        <input type="file" accept="image/*" multiple onChange={handleFiles} className="hidden" />
                      </label>
                      {form.images.length > 0 && (
                        <div className="mt-3 grid grid-cols-3 gap-2">
                          {form.images.map((image, index) => (
                            <div key={index} className="relative aspect-square overflow-hidden rounded-lg border border-slate-200">
                              <img src={image} alt="Property preview" className="h-full w-full object-cover" />
                              <button type="button" onClick={() => removeImage(index)} className="absolute right-1 top-1 rounded-full bg-white px-2 py-1 text-xs font-semibold text-rose-700 shadow">
                                Remove
                              </button>
                            </div>
                          ))}
                        </div>
                      )}
                    </div>
                    <button disabled={saving} className="inline-flex w-full items-center justify-center gap-2 rounded-lg bg-blue-600 px-4 py-3 font-semibold text-white hover:bg-blue-700 disabled:bg-slate-300">
                      <PlusIcon className="h-4 w-4" />
                      {saving ? "Saving..." : editingId ? "Save Changes" : "Add Property"}
                    </button>
                  </div>
                </form>

                <div className="lg:col-span-3">
                  <div className="mb-3 flex items-center justify-between">
                    <h2 className="text-lg font-semibold text-slate-950">Owned Properties</h2>
                    <button onClick={loadDashboard} className="rounded-lg border border-slate-300 px-3 py-2 text-sm font-medium text-slate-700 hover:border-blue-600 hover:text-blue-700">
                      Refresh
                    </button>
                  </div>
                  <div className="grid grid-cols-1 gap-4 xl:grid-cols-2">
                    {properties.length === 0 && (
                      <div className="rounded-lg border border-slate-200 bg-white p-6 text-slate-600">
                        No properties added yet.
                      </div>
                    )}
                    {properties.map((property) => (
                      <article key={property._id} className="overflow-hidden rounded-lg border border-slate-200 bg-white">
                        <div className="h-40 bg-slate-200">
                          {property.images?.[0] ? (
                            <img src={property.images[0]} alt={property.title} className="h-full w-full object-cover" />
                          ) : (
                            <div className="flex h-full items-center justify-center text-slate-500">No image</div>
                          )}
                        </div>
                        <div className="p-4">
                          <div className="mb-3 flex items-start justify-between gap-3">
                            <div>
                              <h3 className="font-semibold text-slate-950">{property.title}</h3>
                              <p className="text-sm text-slate-600">{property.address}</p>
                            </div>
                            <StatusBadge status={property.status} />
                          </div>
                          <div className="mb-4 grid grid-cols-2 gap-2 text-sm text-slate-700">
                            <span>{money(property.rent)}/mo</span>
                            <span>{property.bedrooms || 0} beds</span>
                            <span>{property.bathrooms || 0} baths</span>
                            <span>{property.sqft || 0} sqft</span>
                          </div>
                          <div className="flex flex-wrap gap-2">
                            <button onClick={() => setViewingProperty(property)} className="inline-flex items-center gap-1 rounded-lg border border-slate-300 px-3 py-2 text-sm font-medium text-slate-700 hover:border-blue-600 hover:text-blue-700">
                              <EyeIcon className="h-4 w-4" />
                              View
                            </button>
                            <button onClick={() => editProperty(property)} className="inline-flex items-center gap-1 rounded-lg border border-slate-300 px-3 py-2 text-sm font-medium text-slate-700 hover:border-blue-600 hover:text-blue-700">
                              <PencilIcon className="h-4 w-4" />
                              Edit
                            </button>
                            <button onClick={() => deleteProperty(property._id)} className="inline-flex items-center gap-1 rounded-lg border border-rose-200 px-3 py-2 text-sm font-medium text-rose-700 hover:bg-rose-50">
                              <TrashIcon className="h-4 w-4" />
                              Delete
                            </button>
                          </div>
                        </div>
                      </article>
                    ))}
                  </div>
                </div>
              </section>
            )}

            {activeTab === "bookings" && (
              <section className="space-y-4">
                {bookings.length === 0 && <EmptyState text="No booking requests yet." />}
                {bookings.map((booking) => (
                  <div key={booking._id} className="rounded-lg border border-slate-200 bg-white p-5">
                    <div className="flex flex-col gap-4 md:flex-row md:items-start md:justify-between">
                      <div>
                        <div className="mb-2 flex flex-wrap items-center gap-2">
                          <h3 className="font-semibold text-slate-950">{booking.fullName || booking.tenant?.name || "Tenant"}</h3>
                          <StatusBadge status={booking.status} />
                        </div>
                        <p className="text-sm text-slate-600">{booking.tenant?.email || booking.email || "No email"}</p>
                        <p className="mt-2 text-sm text-slate-700">{booking.property?.title || "Property removed"}</p>
                        <p className="text-sm text-slate-600">Move-in: {formatDate(booking.moveInDate || booking.leaseStart)} | Duration: {booking.leaseDuration || 12} months</p>
                        <p className="text-sm text-slate-600">Occupation: {booking.occupation || "Not provided"} | Income: {money(booking.monthlyIncome)}</p>
                      </div>
                      <div className="flex flex-wrap gap-2">
                        <button disabled={booking.status === "approved"} onClick={() => updateBooking(booking._id, "approved")} className="rounded-lg bg-emerald-600 px-3 py-2 text-sm font-semibold text-white hover:bg-emerald-700 disabled:bg-slate-300">
                          Approve
                        </button>
                        <button disabled={booking.status === "rejected"} onClick={() => updateBooking(booking._id, "rejected")} className="rounded-lg bg-rose-600 px-3 py-2 text-sm font-semibold text-white hover:bg-rose-700 disabled:bg-slate-300">
                          Reject
                        </button>
                      </div>
                    </div>
                  </div>
                ))}
              </section>
            )}

            {activeTab === "payments" && (
              <section className="overflow-hidden rounded-lg border border-slate-200 bg-white">
                {payments.length === 0 ? (
                  <EmptyState text="No rent payments found for your properties." />
                ) : (
                  <div className="overflow-x-auto">
                    <table className="min-w-full divide-y divide-slate-200 text-sm">
                      <thead className="bg-slate-100 text-left text-slate-700">
                        <tr>
                          <th className="px-4 py-3 font-semibold">Tenant</th>
                          <th className="px-4 py-3 font-semibold">Property</th>
                          <th className="px-4 py-3 font-semibold">Amount</th>
                          <th className="px-4 py-3 font-semibold">Method</th>
                          <th className="px-4 py-3 font-semibold">Date</th>
                          <th className="px-4 py-3 font-semibold">Status</th>
                        </tr>
                      </thead>
                      <tbody className="divide-y divide-slate-200">
                        {payments.map((payment) => (
                          <tr key={payment._id}>
                            <td className="px-4 py-3 text-slate-800">{payment.tenant?.name || "Tenant"}</td>
                            <td className="px-4 py-3 text-slate-700">{payment.property?.title || "Property"}</td>
                            <td className="px-4 py-3 font-semibold text-slate-950">{money(payment.amount)}</td>
                            <td className="px-4 py-3 text-slate-700">{payment.method || "Manual"}</td>
                            <td className="px-4 py-3 text-slate-700">{formatDate(payment.paidAt || payment.createdAt)}</td>
                            <td className="px-4 py-3"><StatusBadge status={payment.status} /></td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                )}
              </section>
            )}

            {activeTab === "maintenance" && (
              <section className="space-y-4">
                {maintenance.length === 0 && <EmptyState text="No maintenance requests for your properties." />}
                {maintenance.map((request) => (
                  <div key={request._id} className="rounded-lg border border-slate-200 bg-white p-5">
                    <div className="flex flex-col gap-4 md:flex-row md:items-start md:justify-between">
                      <div>
                        <div className="mb-2 flex flex-wrap items-center gap-2">
                          <h3 className="font-semibold text-slate-950">{request.issue}</h3>
                          <StatusBadge status={request.status} />
                        </div>
                        <p className="text-sm text-slate-700">{request.property?.title || "Property"}</p>
                        <p className="text-sm text-slate-600">Tenant: {request.tenant?.name || "Tenant"} | Priority: {request.priority || "medium"}</p>
                        {request.description && <p className="mt-2 text-sm text-slate-600">{request.description}</p>}
                      </div>
                      <div className="flex flex-wrap gap-2">
                        {["Pending", "In Progress", "Resolved", "Rejected"].map((status) => (
                          <button
                            key={status}
                            disabled={request.status === status}
                            onClick={() => updateMaintenance(request._id, status)}
                            className="rounded-lg border border-slate-300 px-3 py-2 text-sm font-medium text-slate-700 hover:border-blue-600 hover:text-blue-700 disabled:bg-slate-100 disabled:text-slate-400"
                          >
                            {status}
                          </button>
                        ))}
                      </div>
                    </div>
                  </div>
                ))}
              </section>
            )}

            {activeTab === "messages" && (
              <section className="space-y-4">
                {messageThreads.length === 0 && <EmptyState text="No tenant messages yet." />}
                {messageThreads.map((thread) => (
                  <div key={thread.key} className="rounded-lg border border-slate-200 bg-white p-5">
                    <div className="mb-4 flex flex-col gap-1 sm:flex-row sm:items-start sm:justify-between">
                      <div>
                        <h3 className="font-semibold text-slate-950">{thread.tenant?.name || "Tenant"}</h3>
                        <p className="text-sm text-slate-600">{thread.property?.title || "General conversation"}</p>
                      </div>
                      <span className="text-xs text-slate-500">{thread.messages.length} messages</span>
                    </div>
                    <div className="mb-4 max-h-72 space-y-3 overflow-y-auto rounded-lg bg-slate-50 p-3">
                      {thread.messages.map((item) => {
                        const fromOwner = String(item.sender?._id || item.sender) === String(storedUser._id);
                        return (
                          <div key={item._id} className={`flex ${fromOwner ? "justify-end" : "justify-start"}`}>
                            <div className={`max-w-[85%] rounded-lg px-3 py-2 text-sm ${fromOwner ? "bg-blue-600 text-white" : "bg-white text-slate-800 border border-slate-200"}`}>
                              <p>{item.body}</p>
                              <p className={`mt-1 text-[11px] ${fromOwner ? "text-blue-100" : "text-slate-500"}`}>
                                {formatDate(item.createdAt)}
                              </p>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                    <div className="flex flex-col gap-2 sm:flex-row">
                      <input
                        value={replyDrafts[thread.key] || ""}
                        onChange={(event) => updateReplyDraft(thread.key, event.target.value)}
                        className="min-w-0 flex-1 rounded-lg border border-slate-300 px-3 py-2 text-sm focus:border-blue-600 focus:outline-none"
                        placeholder="Write a reply"
                      />
                      <button
                        onClick={() => sendOwnerMessage(thread)}
                        className="inline-flex items-center justify-center gap-2 rounded-lg bg-blue-600 px-4 py-2 text-sm font-semibold text-white hover:bg-blue-700"
                      >
                        <MessageSquareIcon className="h-4 w-4" />
                        Send
                      </button>
                    </div>
                  </div>
                ))}
              </section>
            )}
          </main>

          {viewingProperty && (
            <div className="fixed inset-0 z-30 flex items-center justify-center bg-slate-950/60 p-4">
              <div className="max-h-[90vh] w-full max-w-3xl overflow-y-auto rounded-lg bg-white shadow-xl">
                <div className="flex items-start justify-between border-b border-slate-200 p-5">
                  <div>
                    <h2 className="text-xl font-semibold text-slate-950">{viewingProperty.title}</h2>
                    <p className="text-sm text-slate-600">{viewingProperty.address}</p>
                  </div>
                  <button onClick={() => setViewingProperty(null)} className="rounded-lg px-3 py-2 text-sm font-semibold text-slate-600 hover:bg-slate-100">
                    Close
                  </button>
                </div>
                <div className="p-5">
                  {viewingProperty.images?.length > 0 && (
                    <div className="mb-5 grid grid-cols-1 gap-3 sm:grid-cols-2">
                      {viewingProperty.images.map((image, index) => (
                        <img key={index} src={image} alt={viewingProperty.title} className="h-56 w-full rounded-lg object-cover" />
                      ))}
                    </div>
                  )}
                  <dl className="grid grid-cols-1 gap-4 text-sm sm:grid-cols-2">
                    <Detail label="Rent" value={`${money(viewingProperty.rent)}/month`} />
                    <Detail label="Status" value={viewingProperty.status} />
                    <Detail label="Location" value={viewingProperty.location || "Not set"} />
                    <Detail label="Type" value={viewingProperty.propertyType || "Not set"} />
                    <Detail label="Bedrooms" value={viewingProperty.bedrooms || 0} />
                    <Detail label="Bathrooms" value={viewingProperty.bathrooms || 0} />
                    <Detail label="Size" value={`${viewingProperty.sqft || 0} sqft`} />
                    <Detail label="Tenant Type" value={viewingProperty.tenantType || "Any"} />
                  </dl>
                  {viewingProperty.amenities?.length > 0 && (
                    <div className="mt-5">
                      <h3 className="mb-2 text-sm font-semibold text-slate-950">Amenities</h3>
                      <div className="flex flex-wrap gap-2">
                        {viewingProperty.amenities.map((amenity) => (
                          <span key={amenity} className="rounded-full bg-blue-50 px-3 py-1 text-sm text-blue-700">{amenity}</span>
                        ))}
                      </div>
                    </div>
                  )}
                  {viewingProperty.description && (
                    <div className="mt-5">
                      <h3 className="mb-2 text-sm font-semibold text-slate-950">Description</h3>
                      <p className="text-sm leading-6 text-slate-700">{viewingProperty.description}</p>
                    </div>
                  )}
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    function Detail({ label, value }) {
      return (
        <div className="rounded-lg border border-slate-200 bg-slate-50 p-3">
          <dt className="text-slate-500">{label}</dt>
          <dd className="mt-1 font-medium text-slate-950">{value}</dd>
        </div>
      );
    }

    function EmptyState({ text }) {
      return (
        <div className="rounded-lg border border-slate-200 bg-white p-8 text-center text-slate-600">
          {text}
        </div>
      );
    }

    if (isOwnerSession) {
      ReactDOM.createRoot(document.getElementById("root")).render(<OwnerDashboard />);
    }
  </script>
</body>
</html>
