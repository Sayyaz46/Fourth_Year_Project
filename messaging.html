<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messaging Dashboard</title>
    
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">

    <div id="root"></div>

    <script type="text/babel">
        // --- Icon Components (Replacing Lucide Imports) ---
        const ChevronLeft = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m15 18-6-6 6-6"/></svg>
        );
        const Send = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        );
        const Search = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        );
        const Paperclip = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
        );
        const MoreVertical = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="1"/><circle cx="12" cy="5" r="1"/><circle cx="12" cy="19" r="1"/></svg>
        );

        // --- Messaging Component ---
        function Messaging({ navigateTo, userRole }) {
            const [selectedChat, setSelectedChat] = React.useState(1);
            const [messageText, setMessageText] = React.useState('');
            const [searchTerm, setSearchTerm] = React.useState('');

            const conversations = [
                {
                    id: 1,
                    name: 'Ahmed Khan',
                    role: 'Landlord',
                    lastMessage: 'The apartment is available from next week',
                    time: '10:30 AM',
                    unread: 2,
                    online: true,
                    property: 'Modern Downtown Apartment',
                },
                {
                    id: 2,
                    name: 'Sarah Johnson',
                    role: 'Tenant',
                    lastMessage: 'When can I schedule a viewing?',
                    time: 'Yesterday',
                    unread: 0,
                    online: false,
                    property: 'Luxury Family House',
                },
                {
                    id: 3,
                    name: 'Mike Davis',
                    role: 'Tenant',
                    lastMessage: 'Thank you for the quick response!',
                    time: '2 days ago',
                    unread: 0,
                    online: false,
                    property: 'Cozy Studio',
                },
            ];

            const messages = [
                {
                    id: 1,
                    senderId: 1,
                    senderName: 'Ahmed Khan',
                    text: 'Hello! I saw your interest in the Modern Downtown Apartment.',
                    time: '10:15 AM',
                    isOwn: false,
                },
                {
                    id: 2,
                    senderId: 'me',
                    senderName: 'You',
                    text: 'Yes, I would like to know more about it. Is it still available?',
                    time: '10:20 AM',
                    isOwn: true,
                },
                {
                    id: 3,
                    senderId: 1,
                    senderName: 'Ahmed Khan',
                    text: 'Yes, it is available. The apartment is fully furnished with 3 bedrooms.',
                    time: '10:25 AM',
                    isOwn: false,
                },
                {
                    id: 4,
                    senderId: 1,
                    senderName: 'Ahmed Khan',
                    text: 'The apartment is available from next week',
                    time: '10:30 AM',
                    isOwn: false,
                },
            ];

            const filteredConversations = conversations.filter((conv) =>
                conv.name.toLowerCase().includes(searchTerm.toLowerCase())
            );

            const handleSendMessage = () => {
                if (messageText.trim()) {
                    // Logic to simulate sending a message would go here
                    console.log("Sending message:", messageText);
                    setMessageText('');
                }
            };

            return (
                <div className="min-h-screen bg-gray-50">
                    {/* Header */}
                    <header className="bg-white border-b border-gray-200 sticky top-0 z-10">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
                            <button
                                onClick={() =>
                                    navigateTo(
                                        userRole === 'tenant'
                                            ? 'tenant-dashboard.html'
                                            : userRole === 'landlord'
                                            ? 'landlord-dashboard.html'
                                            : 'index.html'
                                    )
                                }
                                className="flex items-center gap-2 text-gray-700 hover:text-blue-600 transition-colors"
                            >
                                <ChevronLeft className="w-5 h-5" />
                                <span>Back to Dashboard</span>
                            </button>
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
                        <div className="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden h-[calc(100vh-200px)]">
                            <div className="grid grid-cols-1 md:grid-cols-3 h-full">
                                {/* Conversations List */}
                                <div className="border-r border-gray-200 flex flex-col">
                                    <div className="p-4 border-b border-gray-200">
                                        <h2 className="text-xl text-gray-900 mb-4">Messages</h2>
                                        <div className="relative">
                                            <Search className="absolute left-3 top-1/2 transform -translate-y-1/2 w-5 h-5 text-gray-400" />
                                            <input
                                                type="text"
                                                placeholder="Search conversations..."
                                                value={searchTerm}
                                                onChange={(e) => setSearchTerm(e.target.value)}
                                                className="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-600"
                                            />
                                        </div>
                                    </div>
                                    <div className="flex-1 overflow-y-auto">
                                        {filteredConversations.map((conv) => (
                                            <button
                                                key={conv.id}
                                                onClick={() => setSelectedChat(conv.id)}
                                                className={`w-full p-4 border-b border-gray-200 hover:bg-gray-50 transition-colors text-left ${
                                                    selectedChat === conv.id ? 'bg-blue-50' : ''
                                                }`}
                                            >
                                                <div className="flex items-start gap-3">
                                                    <div className="relative">
                                                        <div className="w-12 h-12 bg-blue-100 rounded-full flex items-center justify-center flex-shrink-0">
                                                            <span className="text-blue-600">
                                                                {conv.name
                                                                    .split(' ')
                                                                    .map((n) => n[0])
                                                                    .join('')}
                                                            </span>
                                                        </div>
                                                        {conv.online && (
                                                            <div className="absolute bottom-0 right-0 w-3 h-3 bg-green-500 border-2 border-white rounded-full" />
                                                        )}
                                                    </div>
                                                    <div className="flex-1 min-w-0">
                                                        <div className="flex items-center justify-between mb-1">
                                                            <p className="text-sm text-gray-900 truncate">{conv.name}</p>
                                                            <span className="text-xs text-gray-500">{conv.time}</span>
                                                        </div>
                                                        <p className="text-xs text-gray-500 mb-1">{conv.property}</p>
                                                        <div className="flex items-center justify-between">
                                                            <p className="text-sm text-gray-600 truncate">{conv.lastMessage}</p>
                                                            {conv.unread > 0 && (
                                                                <span className="ml-2 bg-blue-600 text-white text-xs px-2 py-0.5 rounded-full">
                                                                    {conv.unread}
                                                                </span>
                                                            )}
                                                        </div>
                                                    </div>
                                                </div>
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                {/* Chat Area */}
                                <div className="md:col-span-2 flex flex-col">
                                    {selectedChat ? (
                                        <>
                                            {/* Chat Header */}
                                            <div className="p-4 border-b border-gray-200 flex items-center justify-between">
                                                <div className="flex items-center gap-3">
                                                    <div className="relative">
                                                        <div className="w-10 h-10 bg-blue-100 rounded-full flex items-center justify-center">
                                                            <span className="text-blue-600">
                                                                {conversations
                                                                    .find((c) => c.id === selectedChat)
                                                                    ?.name.split(' ')
                                                                    .map((n) => n[0])
                                                                    .join('')}
                                                            </span>
                                                        </div>
                                                        {conversations.find((c) => c.id === selectedChat)?.online && (
                                                            <div className="absolute bottom-0 right-0 w-3 h-3 bg-green-500 border-2 border-white rounded-full" />
                                                        )}
                                                    </div>
                                                    <div>
                                                        <p className="text-sm text-gray-900">
                                                            {conversations.find((c) => c.id === selectedChat)?.name}
                                                        </p>
                                                        <p className="text-xs text-gray-500">
                                                            {conversations.find((c) => c.id === selectedChat)?.online
                                                                ? 'Online'
                                                                : 'Offline'}
                                                        </p>
                                                    </div>
                                                </div>
                                                <button className="p-2 hover:bg-gray-100 rounded-lg transition-colors">
                                                    <MoreVertical className="w-5 h-5 text-gray-600" />
                                                </button>
                                            </div>

                                            {/* Property Info Banner */}
                                            <div className="bg-blue-50 border-b border-blue-200 p-3">
                                                <p className="text-sm text-gray-700">
                                                    Discussing:{' '}
                                                    <span className="text-blue-600">
                                                        {conversations.find((c) => c.id === selectedChat)?.property}
                                                    </span>
                                                </p>
                                            </div>

                                            {/* Messages */}
                                            <div className="flex-1 overflow-y-auto p-4 space-y-4">
                                                {messages.map((msg) => (
                                                    <div
                                                        key={msg.id}
                                                        className={`flex ${msg.isOwn ? 'justify-end' : 'justify-start'}`}
                                                    >
                                                        <div
                                                            className={`max-w-xs lg:max-w-md ${
                                                                msg.isOwn
                                                                    ? 'bg-blue-600 text-white'
                                                                    : 'bg-gray-100 text-gray-900'
                                                            } rounded-lg p-3`}
                                                        >
                                                            {!msg.isOwn && (
                                                                <p className="text-xs text-gray-600 mb-1">{msg.senderName}</p>
                                                            )}
                                                            <p className="text-sm">{msg.text}</p>
                                                            <p
                                                                className={`text-xs mt-1 ${
                                                                    msg.isOwn ? 'text-blue-100' : 'text-gray-500'
                                                                }`}
                                                            >
                                                                {msg.time}
                                                            </p>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>

                                            {/* Message Input */}
                                            <div className="p-4 border-t border-gray-200">
                                                <div className="flex items-center gap-2">
                                                    <button className="p-2 hover:bg-gray-100 rounded-lg transition-colors">
                                                        <Paperclip className="w-5 h-5 text-gray-600" />
                                                    </button>
                                                    <input
                                                        type="text"
                                                        value={messageText}
                                                        onChange={(e) => setMessageText(e.target.value)}
                                                        onKeyPress={(e) => e.key === 'Enter' && handleSendMessage()}
                                                        placeholder="Type a message..."
                                                        className="flex-1 px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-600"
                                                    />
                                                    <button
                                                        onClick={handleSendMessage}
                                                        className="bg-blue-600 text-white p-2 rounded-lg hover:bg-blue-700 transition-colors"
                                                    >
                                                        <Send className="w-5 h-5" />
                                                    </button>
                                                </div>
                                            </div>
                                        </>
                                    ) : (
                                        <div className="flex-1 flex items-center justify-center text-gray-500">
                                            <div className="text-center">
                                                <p className="text-lg mb-2">Select a conversation</p>
                                                <p className="text-sm">Choose a conversation to start messaging</p>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    </main>
                </div>
            );
        }

        // --- App Wrapper to handle props ---
        function App() {
            // Function to handle navigation
            const navigateTo = (page) => {
                window.location.href = page;
            };

            // Set userRole here ('tenant' or 'landlord')
            const userRole = 'tenant'; 

            return <Messaging navigateTo={navigateTo} userRole={userRole} />;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
