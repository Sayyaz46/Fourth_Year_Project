<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Reset Password</title>

<link rel="stylesheet"
href="assets/css/base.css">

<link rel="stylesheet"
href="assets/css/components.css">

</head>

<body>

<div class="auth-card">

<h2>Reset Password</h2>

<input
id="password"
type="password"
placeholder="New Password">

<br><br>

<button onclick="resetPassword()">

Reset Password

</button>

</div>

<script>

const token=
new URLSearchParams(
window.location.search
).get("token");

async function resetPassword(){

const password=
document.getElementById("password").value;

const res=
await fetch(
"http://localhost:5000/api/auth/reset-password",
{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
token,
password
})

});

const data=
await res.json();

alert(data.message);

if(res.ok){

window.location.href="login.html";

}

}

</script>

</body>

</html>
