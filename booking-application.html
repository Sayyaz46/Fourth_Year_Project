<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Application</title>
    
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">

    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // --- Icon Components (Replicating Lucide-React) ---
        const ChevronLeft = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m15 18-6-6 6-6"/></svg>
        );
        const Calendar = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>
        );
        const Upload = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>
        );
        const CheckCircle = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
        );

        // --- Main Component ---
        function BookingFlow({ propertyId, navigateTo }) {
            const [step, setStep] = useState(1);
            const [formData, setFormData] = useState({
                moveInDate: '',
                leaseDuration: '12',
                fullName: '',
                email: '',
                phone: '',
                occupation: '',
                monthlyIncome: '',
                emergencyContact: '',
                emergencyPhone: '',
                documents: [],
            });

            const property = {
                title: 'Modern Downtown Apartment',
                price: 25000,
            };

            const handleSubmit = () => {
                setStep(3);
            };

            return (
                <div className="min-h-screen bg-gray-50">
                {/* Header */}
                <header className="bg-white border-b border-gray-200 sticky top-0 z-10">
                    <div className="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
                    <button
                        onClick={() => navigateTo('property-details', propertyId)}
                        className="flex items-center gap-2 text-gray-700 hover:text-blue-600 transition-colors"
                    >
                        <ChevronLeft className="w-5 h-5" />
                        <span>Back to Property</span>
                    </button>
                    </div>
                </header>

                <main className="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
                    {/* Progress Steps */}
                    <div className="mb-8">
                    <div className="flex items-center justify-between">
                        {[1, 2, 3].map((s) => (
                        <div key={s} className="flex-1 flex items-center">
                            <div
                            className={`w-10 h-10 rounded-full flex items-center justify-center transition-all ${
                                s <= step
                                ? 'bg-blue-600 text-white'
                                : 'bg-gray-200 text-gray-500'
                            }`}
                            >
                            {s < step ? <CheckCircle className="w-6 h-6" /> : s}
                            </div>
                            {s < 3 && (
                            <div
                                className={`flex-1 h-1 mx-2 transition-all ${
                                s < step ? 'bg-blue-600' : 'bg-gray-200'
                                }`}
                            />
                            )}
                        </div>
                        ))}
                    </div>
                    <div className="flex items-center justify-between mt-2">
                        <span className="text-sm text-gray-600">Date Selection</span>
                        <span className="text-sm text-gray-600">Application</span>
                        <span className="text-sm text-gray-600">Confirmation</span>
                    </div>
                    </div>

                    {/* Step 1: Date Selection */}
                    {step === 1 && (
                    <div className="bg-white rounded-xl border border-gray-200 p-8 shadow-sm">
                        <h2 className="text-2xl text-gray-900 mb-6">Select Move-in Date</h2>
                        <div className="space-y-6">
                        <div>
                            <label className="block text-gray-700 mb-2">Property</label>
                            <div className="p-4 bg-blue-50 rounded-lg">
                            <p className="text-gray-900">{property.title}</p>
                            <p className="text-blue-600">৳{property.price.toLocaleString()}/month</p>
                            </div>
                        </div>
                        <div>
                            <label className="block text-gray-700 mb-2">Move-in Date</label>
                            <div className="relative">
                            <Calendar className="absolute left-3 top-1/2 transform -translate-y-1/2 w-5 h-5 text-gray-400" />
                            <input
                                type="date"
                                value={formData.moveInDate}
                                onChange={(e) =>
                                setFormData({ ...formData, moveInDate: e.target.value })
                                }
                                className="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-600"
                            />
                            </div>
                        </div>
                        <div>
                            <label className="block text-gray-700 mb-2">Lease Duration</label>
                            <select
                            value={formData.leaseDuration}
                            onChange={(e) =>
                                setFormData({ ...formData, leaseDuration: e.target.value })
                            }
                            className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-600"
                            >
                            <option value="6">6 months</option>
                            <option value="12">12 months</option>
                            <option value="24">24 months</option>
                            </select>
                        </div>
                        <button
                            onClick={() => setStep(2)}
                            disabled={!formData.moveInDate}
                            className="w-full bg-blue-600 text-white py-3 px-6 rounded-lg hover:bg-blue-700 transition-colors disabled:bg-gray-300 disabled:cursor-not-allowed"
                        >
                            Continue to Application
                        </button>
                        </div>
                    </div>
                    )}

                    {/* Step 2: Application Form */}
                    {step === 2 && (
                    <div className="bg-white rounded-xl border border-gray-200 p-8 shadow-sm">
                        <h2 className="text-2xl text-gray-900 mb-6">Application Form</h2>
                        <div className="space-y-6">
                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-6">
                            <div>
                            <label className="block text-gray-700 mb-2">Full Name *</label>
                            <input
                                type="text"
                                value={formData.fullName}
                                onChange={(e) =>
                                setFormData({ ...formData, fullName: e.target.value })
                                }
                                className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-600"
                                placeholder="John Smith"
                            />
                            </div>
                            <div>
                            <label className="block text-gray-700 mb-2">Email *</label>
                            <input
                                type="email"
                                value={formData.email}
                                onChange={(e) =>
                                setFormData({ ...formData, email: e.target.value })
                                }
                                className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-600"
                                placeholder="john@example.com"
                            />
                            </div>
                        </div>

                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-6">
                            <div>
                            <label className="block text-gray-700 mb-2">Phone *</label>
                            <input
                                type="tel"
                                value={formData.phone}
                                onChange={(e) =>
                                setFormData({ ...formData, phone: e.target.value })
                                }
                                className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-600"
                                placeholder="+880 1XXX-XXXXXX"
                            />
                            </div>
                            <div>
                            <label className="block text-gray-700 mb-2">Occupation *</label>
                            <input
                                type="text"
                                value={formData.occupation}
                                onChange={(e) =>
                                setFormData({ ...formData, occupation: e.target.value })
                                }
                                className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-600"
                                placeholder="Software Engineer"
                            />
                            </div>
                        </div>

                        <div>
                            <label className="block text-gray-700 mb-2">Monthly Income (৳) *</label>
                            <input
                                type="number"
                                value={formData.monthlyIncome}
                                onChange={(e) =>
                                setFormData({ ...formData, monthlyIncome: e.target.value })
                                }
                                className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-600"
                                placeholder="50000"
                            />
                        </div>

                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-6">
                            <div>
                            <label className="block text-gray-700 mb-2">Emergency Contact</label>
                            <input
                                type="text"
                                value={formData.emergencyContact}
                                onChange={(e) =>
                                setFormData({ ...formData, emergencyContact: e.target.value })
                                }
                                className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-600"
                                placeholder="Jane Smith"
                            />
                            </div>
                            <div>
                            <label className="block text-gray-700 mb-2">Emergency Phone</label>
                            <input
                                type="tel"
                                value={formData.emergencyPhone}
                                onChange={(e) =>
                                setFormData({ ...formData, emergencyPhone: e.target.value })
                                }
                                className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-600"
                                placeholder="+880 1XXX-XXXXXX"
                            />
                            </div>
                        </div>

                        <div>
                            <label className="block text-gray-700 mb-2">Upload Documents</label>
                            <div className="border-2 border-dashed border-gray-300 rounded-lg p-8 text-center hover:border-blue-600 transition-colors cursor-pointer">
                            <Upload className="w-12 h-12 text-gray-400 mx-auto mb-2" />
                            <p className="text-gray-600 mb-1">Click to upload or drag and drop</p>
                            <p className="text-sm text-gray-500">
                                NID, Passport, or Income Certificate (PDF, JPG, PNG)
                            </p>
                            </div>
                        </div>

                        <div className="flex gap-4">
                            <button
                            onClick={() => setStep(1)}
                            className="flex-1 border border-gray-300 text-gray-700 py-3 px-6 rounded-lg hover:bg-gray-50 transition-colors"
                            >
                            Back
                            </button>
                            <button
                            onClick={handleSubmit}
                            disabled={
                                !formData.fullName ||
                                !formData.email ||
                                !formData.phone ||
                                !formData.occupation ||
                                !formData.monthlyIncome
                            }
                            className="flex-1 bg-blue-600 text-white py-3 px-6 rounded-lg hover:bg-blue-700 transition-colors disabled:bg-gray-300 disabled:cursor-not-allowed"
                            >
                            Submit Application
                            </button>
                        </div>
                        </div>
                    </div>
                    )}

                    {/* Step 3: Confirmation */}
                    {step === 3 && (
                    <div className="bg-white rounded-xl border border-gray-200 p-8 shadow-sm text-center">
                        <div className="bg-green-100 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-6">
                        <CheckCircle className="w-12 h-12 text-green-600" />
                        </div>
                        <h2 className="text-2xl text-gray-900 mb-4">Application Submitted!</h2>
                        <p className="text-gray-600 mb-8 max-w-md mx-auto">
                        Your booking application has been submitted successfully. The landlord will review
                        your application and get back to you within 24-48 hours.
                        </p>
                        <div className="bg-blue-50 rounded-lg p-6 mb-8">
                        <h3 className="text-lg text-gray-900 mb-4">Next Steps</h3>
                        <ol className="text-left text-gray-600 space-y-2">
                            <li className="flex items-start gap-2">
                            <span className="text-blue-600 font-semibold">1.</span>
                            <span>Wait for landlord approval</span>
                            </li>
                            <li className="flex items-start gap-2">
                            <span className="text-blue-600 font-semibold">2.</span>
                            <span>Complete payment for security deposit</span>
                            </li>
                            <li className="flex items-start gap-2">
                            <span className="text-blue-600 font-semibold">3.</span>
                            <span>Sign the lease agreement</span>
                            </li>
                            <li className="flex items-start gap-2">
                            <span className="text-blue-600 font-semibold">4.</span>
                            <span>Receive keys and move in!</span>
                            </li>
                        </ol>
                        </div>
                        <div className="flex gap-4">
                        <button
                            onClick={() => navigateTo('properties')}
                            className="flex-1 border border-gray-300 text-gray-700 py-3 px-6 rounded-lg hover:bg-gray-50 transition-colors"
                        >
                            Browse More Properties
                        </button>
                        <button
                            onClick={() => navigateTo('tenant-dashboard')}
                            className="flex-1 bg-blue-600 text-white py-3 px-6 rounded-lg hover:bg-blue-700 transition-colors"
                        >
                            Go to Dashboard
                        </button>
                        </div>
                    </div>
                    )}
                </main>
                </div>
            );
        }

        // --- App Wrapper to handle props and mounting ---
        function App() {
            // Simulated navigation function
            const navigateTo = (view, propertyId) => {
                console.log(`Navigating to: ${view}, Property ID: ${propertyId}`);
                if (view === 'tenant-dashboard') {
                    window.location.href = 'tenant-dashboard.html';
                } else if (view === 'properties') {
                    window.location.href = 'property-listings.html';
                } else if (view === 'property-details') {
                    // Assuming you have this page
                    window.location.href = `property-details.html?id=${propertyId}`; 
                } else {
                    alert(`Navigation to ${view} triggered!`);
                }
            };

            return <BookingFlow propertyId={1} navigateTo={navigateTo} />;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
