<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tenant Dashboard</title>
    
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">

    <div id="root"></div>

    <script type="text/babel">
        // --- Icon Components (Replacing Lucide Imports) ---
        const Building2 = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M6 22V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v18Z"/><path d="M6 12H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2"/><path d="M18 9h2a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2h-2"/><path d="M10 6h4"/><path d="M10 10h4"/><path d="M10 14h4"/><path d="M10 18h4"/></svg>;
        const CreditCard = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="20" height="14" x="2" y="5" rx="2"/><line x1="2" x2="22" y1="10" y2="10"/></svg>;
        const Wrench = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>;
        const LogOut = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></svg>;
        const Calendar = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>;
        const CheckCircle = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>;
        const Clock = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>;
        const AlertCircle = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></svg>;
        const MessageSquare = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>;
        const Bell = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>;

        // --- Tenant Dashboard Component ---

        function TenantDashboard({ navigateTo, onLogout }) {
            const activeBooking = {
                property: 'Modern Downtown Apartment',
                address: '123 Main St, Dhaka, Gulshan',
                rent: 25000,
                leaseStart: '2024-01-01',
                leaseEnd: '2025-12-31',
                nextPaymentDue: '2025-01-01',
            };

            const paymentHistory = [
                { id: 1, date: '2025-12-01', amount: 25000, status: 'Paid', method: 'bKash' },
                { id: 2, date: '2025-11-01', amount: 25000, status: 'Paid', method: 'Bank Transfer' },
                { id: 3, date: '2025-10-01', amount: 25000, status: 'Paid', method: 'bKash' },
            ];

            const maintenanceRequests = [
                { id: 1, issue: 'AC Repair', status: 'In Progress', date: '2025-12-10', priority: 'High' },
                { id: 2, issue: 'Plumbing Check', status: 'Resolved', date: '2025-12-05', priority: 'Medium' },
            ];

            return (
                <div className="min-h-screen bg-gray-50">
                {/* Header */}
                <header className="bg-white border-b border-gray-200 sticky top-0 z-10">
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
                    <div className="flex items-center justify-between">
                        <div className="flex items-center gap-3">
                        <div className="bg-blue-600 p-2 rounded-lg">
                            <Building2 className="w-6 h-6 text-white" />
                        </div>
                        <div>
                            <h1 className="text-xl text-gray-900">Tenant Dashboard</h1>
                            <p className="text-sm text-gray-600">Welcome back, John</p>
                        </div>
                        </div>
                        <div className="flex items-center gap-3">
                        <button
                            onClick={() => window.location.href = 'messaging.html'}
                            className="relative p-2 text-gray-700 hover:text-blue-600 transition-colors"
                            title="Messages"
                        >
                            <MessageSquare className="w-5 h-5" />
                            <span className="absolute top-0 right-0 w-2 h-2 bg-red-500 rounded-full"></span>
                        </button>
                        <button
                            onClick={() => window.location.href = 'notifications.html'}
                            className="relative p-2 text-gray-700 hover:text-blue-600 transition-colors"
                            title="Notifications"
                        >
                            <Bell className="w-5 h-5" />
                            <span className="absolute top-0 right-0 w-2 h-2 bg-red-500 rounded-full"></span>
                        </button>
                        <button
                            onClick={() => window.location.href = 'property-listings.html'}
                            className="px-4 py-2 text-gray-700 hover:text-blue-600 transition-colors hidden sm:block"
                        >
                            Browse Properties
                        </button>
                        <button
                            onClick={onLogout}
                            className="flex items-center gap-2 px-4 py-2 text-gray-700 hover:text-red-600 transition-colors"
                        >
                            <LogOut className="w-5 h-5" />
                            <span className="hidden sm:inline">Logout</span>
                        </button>
                        </div>
                    </div>
                    </div>
                </header>

                <main className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
                    {/* Quick Actions */}
                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-8">
                    <button
                        onClick={() => window.location.href = 'payment.html'}
                        className="bg-blue-600 text-white p-6 rounded-xl hover:bg-blue-700 transition-all hover:shadow-lg flex items-center gap-4 group"
                    >
                        <div className="bg-blue-500 p-3 rounded-lg">
                        <CreditCard className="w-6 h-6" />
                        </div>
                        <div className="text-left">
                        <h3 className="text-lg mb-1">Pay Rent</h3>
                        <p className="text-sm text-blue-100">Quick payment options</p>
                        </div>
                        <div className="ml-auto group-hover:translate-x-1 transition-transform">→</div>
                    </button>
                    <button
                        onClick={() => window.location.href = 'maintenance-request.html'}
                        className="bg-green-600 text-white p-6 rounded-xl hover:bg-green-700 transition-all hover:shadow-lg flex items-center gap-4 group"
                    >
                        <div className="bg-green-500 p-3 rounded-lg">
                            <Wrench className="w-6 h-6" />
                        </div>
                        <div className="text-left">
                            <h3 className="text-lg mb-1">Raise Maintenance Request</h3>
                            <p className="text-sm text-green-100">Report an issue</p>
                        </div>
                        <div className="ml-auto group-hover:translate-x-1 transition-transform">→</div>
                    </button>
                    </div>

                    {/* Active Booking */}
                    <div className="bg-white rounded-xl border border-gray-200 p-6 mb-8 shadow-sm">
                    <h2 className="text-xl text-gray-900 mb-4">Active Booking</h2>
                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        <div className="lg:col-span-2">
                        <div className="flex items-start gap-4">
                            <div className="w-24 h-24 bg-gradient-to-br from-blue-400 to-blue-600 rounded-lg flex-shrink-0"></div>
                            <div className="flex-1">
                            <h3 className="text-lg text-gray-900 mb-1">{activeBooking.property}</h3>
                            <p className="text-gray-600 mb-3">{activeBooking.address}</p>
                            <div className="flex flex-wrap gap-4 text-sm text-gray-600">
                                <div className="flex items-center gap-2">
                                <Calendar className="w-4 h-4" />
                                <span>
                                    {activeBooking.leaseStart} - {activeBooking.leaseEnd}
                                </span>
                                </div>
                                <div className="flex items-center gap-2">
                                <CreditCard className="w-4 h-4" />
                                <span>৳{activeBooking.rent.toLocaleString()}/month</span>
                                </div>
                            </div>
                            </div>
                        </div>
                        </div>
                        <div className="bg-amber-50 border border-amber-200 rounded-lg p-4">
                        <p className="text-sm text-amber-800 mb-2">Next Payment Due</p>
                        <p className="text-2xl text-amber-900 mb-1">{activeBooking.nextPaymentDue}</p>
                        <button
                            onClick={() => window.location.href = 'payment.html'}
                            className="mt-2 w-full bg-amber-600 text-white px-4 py-2 rounded-lg hover:bg-amber-700 transition-colors text-sm"
                        >
                            Pay Now
                        </button>
                        </div>
                    </div>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                    {/* Payment History */}
                    <div className="bg-white rounded-xl border border-gray-200 shadow-sm">
                        <div className="px-6 py-4 border-b border-gray-200">
                        <h2 className="text-xl text-gray-900">Payment History</h2>
                        </div>
                        <div className="divide-y divide-gray-200">
                        {paymentHistory.map((payment) => (
                            <div key={payment.id} className="px-6 py-4 hover:bg-gray-50 transition-colors">
                            <div className="flex items-center justify-between">
                                <div className="flex items-center gap-3">
                                <div className="bg-green-100 p-2 rounded-lg">
                                    <CheckCircle className="w-5 h-5 text-green-600" />
                                </div>
                                <div>
                                    <p className="text-sm text-gray-900">৳{payment.amount.toLocaleString()}</p>
                                    <p className="text-sm text-gray-500">{payment.method}</p>
                                </div>
                                </div>
                                <div className="text-right">
                                <p className="text-sm text-gray-900">{payment.date}</p>
                                <span className="inline-block px-2 py-1 text-xs bg-green-100 text-green-800 rounded-full">
                                    {payment.status}
                                </span>
                                </div>
                            </div>
                            </div>
                        ))}
                        </div>
                        <div className="px-6 py-4 border-t border-gray-200">
                        <button className="text-sm text-blue-600 hover:text-blue-700 transition-colors">
                            View All Payments →
                        </button>
                        </div>
                    </div>

                    {/* Maintenance Requests */}
                    <div className="bg-white rounded-xl border border-gray-200 shadow-sm">
                        <div className="px-6 py-4 border-b border-gray-200">
                        <h2 className="text-xl text-gray-900">Maintenance Requests</h2>
                        </div>
                        <div className="divide-y divide-gray-200">
                        {maintenanceRequests.map((request) => (
                            <div key={request.id} className="px-6 py-4 hover:bg-gray-50 transition-colors">
                            <div className="flex items-center justify-between">
                                <div className="flex items-center gap-3">
                                <div
                                    className={`p-2 rounded-lg ${
                                    request.status === 'In Progress'
                                        ? 'bg-yellow-100'
                                        : 'bg-green-100'
                                    }`}
                                >
                                    {request.status === 'In Progress' ? (
                                    <Clock className="w-5 h-5 text-yellow-600" />
                                    ) : (
                                    <CheckCircle className="w-5 h-5 text-green-600" />
                                    )}
                                </div>
                                <div>
                                    <p className="text-sm text-gray-900">{request.issue}</p>
                                    <p className="text-sm text-gray-500">{request.date}</p>
                                </div>
                                </div>
                                <div className="text-right">
                                <span
                                    className={`inline-block px-2 py-1 text-xs rounded-full mb-1 ${
                                    request.priority === 'High'
                                        ? 'bg-red-100 text-red-800'
                                        : 'bg-yellow-100 text-yellow-800'
                                    }`}
                                >
                                    {request.priority}
                                </span>
                                <br />
                                <span
                                    className={`inline-block px-2 py-1 text-xs rounded-full ${
                                    request.status === 'In Progress'
                                        ? 'bg-yellow-100 text-yellow-800'
                                        : 'bg-green-100 text-green-800'
                                    }`}
                                >
                                    {request.status}
                                </span>
                                </div>
                            </div>
                            </div>
                        ))}
                        </div>
                        <div className="px-6 py-4 border-t border-gray-200">
                        <button
                            onClick={() => window.location.href = 'maintenance-request.html'}
                            className="text-sm text-blue-600 hover:text-blue-700 transition-colors"
                        >
                            New Request →
                        </button>
                    </div>
                    </div>
                    </div>
                </main>
                </div>
            );
        }

        // --- Main App Wrapper to Render the Component ---
        function App() {
            // Mock functions to handle navigation and logout
            const navigateTo = (view) => {
                alert(`Navigating to: ${view}`);
                console.log(`Navigating to: ${view}`);
            };

            const onLogout = () => {
                alert('Logging out...');
                console.log('Logging out...');
            };

            return <TenantDashboard navigateTo={navigateTo} onLogout={onLogout} />;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
