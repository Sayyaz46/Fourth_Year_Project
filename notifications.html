<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications</title>
    
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">

    <div id="root"></div>

    <script type="text/babel">
        // --- Icon Components (Replacing Lucide Imports) ---
        const ChevronLeft = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m15 18-6-6 6-6"/></svg>
        );
        const Bell = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>
        );
        const DollarSign = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" x2="12" y1="2" y2="22"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
        );
        const Wrench = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
        );
        const MessageSquare = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        );
        const CheckCircle = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
        );
        const X = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
        );

        // --- Notifications Component ---
        function Notifications({ navigateTo, userRole }) {
            const notifications = [
                {
                    id: 1,
                    type: 'rent-due',
                    title: 'Rent Payment Due',
                    message: 'Your rent payment of ৳25,000 is due on January 1, 2026',
                    time: '2 hours ago',
                    read: false,
                    icon: DollarSign,
                    color: 'amber',
                },
                {
                    id: 2,
                    type: 'message',
                    title: 'New Message from Ahmed Khan',
                    message: 'The apartment is available from next week',
                    time: '5 hours ago',
                    read: false,
                    icon: MessageSquare,
                    color: 'blue',
                },
                {
                    id: 3,
                    type: 'maintenance',
                    title: 'Maintenance Request Update',
                    message: 'Your AC repair request has been assigned to a technician',
                    time: '1 day ago',
                    read: false,
                    icon: Wrench,
                    color: 'green',
                },
                {
                    id: 4,
                    type: 'payment',
                    title: 'Payment Successful',
                    message: 'Your rent payment of ৳25,000 has been processed',
                    time: '2 days ago',
                    read: true,
                    icon: CheckCircle,
                    color: 'green',
                },
                {
                    id: 5,
                    type: 'message',
                    title: 'New Message from Sarah Johnson',
                    message: 'When can I schedule a viewing?',
                    time: '3 days ago',
                    read: true,
                    icon: MessageSquare,
                    color: 'blue',
                },
                {
                    id: 6,
                    type: 'maintenance',
                    title: 'Maintenance Request Completed',
                    message: 'Your plumbing issue has been resolved',
                    time: '5 days ago',
                    read: true,
                    icon: CheckCircle,
                    color: 'green',
                },
            ];

            const unreadCount = notifications.filter((n) => !n.read).length;

            return (
                <div className="min-h-screen bg-gray-50">
                    {/* Header */}
                    <header className="bg-white border-b border-gray-200 sticky top-0 z-10">
                        <div className="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
                            <button
                                onClick={() =>
                                    navigateTo(
                                        userRole === 'tenant'
                                            ? 'tenant-dashboard.html'
                                            : userRole === 'landlord'
                                            ? 'landlord-dashboard.html'
                                            : 'index.html'
                                    )
                                }
                                className="flex items-center gap-2 text-gray-700 hover:text-blue-600 transition-colors"
                            >
                                <ChevronLeft className="w-5 h-5" />
                                <span>Back to Dashboard</span>
                            </button>
                        </div>
                    </header>

                    <main className="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
                        <div className="bg-white rounded-xl border border-gray-200 shadow-sm">
                            {/* Header */}
                            <div className="p-6 border-b border-gray-200">
                                <div className="flex items-center justify-between">
                                    <div className="flex items-center gap-3">
                                        <div className="bg-blue-100 p-2 rounded-lg">
                                            <Bell className="w-6 h-6 text-blue-600" />
                                        </div>
                                        <div>
                                            <h2 className="text-xl text-gray-900">Notifications</h2>
                                            <p className="text-sm text-gray-600">
                                                {unreadCount} unread notification{unreadCount !== 1 ? 's' : ''}
                                            </p>
                                        </div>
                                    </div>
                                    {unreadCount > 0 && (
                                        <button className="text-sm text-blue-600 hover:text-blue-700 transition-colors">
                                            Mark all as read
                                        </button>
                                    )}
                                </div>
                            </div>

                            {/* Notifications List */}
                            <div className="divide-y divide-gray-200">
                                {notifications.map((notification) => {
                                    const Icon = notification.icon;
                                    return (
                                        <div
                                            key={notification.id}
                                            className={`p-6 hover:bg-gray-50 transition-colors ${
                                                !notification.read ? 'bg-blue-50/30' : ''
                                            }`}
                                        >
                                            <div className="flex items-start gap-4">
                                                <div
                                                    className={`p-3 rounded-lg flex-shrink-0 ${
                                                        notification.color === 'amber'
                                                            ? 'bg-amber-100'
                                                            : notification.color === 'blue'
                                                            ? 'bg-blue-100'
                                                            : 'bg-green-100'
                                                    }`}
                                                >
                                                    <Icon
                                                        className={`w-6 h-6 ${
                                                            notification.color === 'amber'
                                                                ? 'text-amber-600'
                                                                : notification.color === 'blue'
                                                                ? 'text-blue-600'
                                                                : 'text-green-600'
                                                        }`}
                                                    />
                                                </div>
                                                <div className="flex-1 min-w-0">
                                                    <div className="flex items-start justify-between mb-1">
                                                        <h3 className="text-sm text-gray-900">{notification.title}</h3>
                                                        <button className="p-1 hover:bg-gray-200 rounded transition-colors ml-2">
                                                            <X className="w-4 h-4 text-gray-500" />
                                                        </button>
                                                    </div>
                                                    <p className="text-sm text-gray-600 mb-2">{notification.message}</p>
                                                    <div className="flex items-center gap-3">
                                                        <span className="text-xs text-gray-500">{notification.time}</span>
                                                        {!notification.read && (
                                                            <span className="w-2 h-2 bg-blue-600 rounded-full" />
                                                        )}
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>

                            {/* Empty State (if no notifications) */}
                            {notifications.length === 0 && (
                                <div className="p-12 text-center">
                                    <Bell className="w-16 h-16 text-gray-300 mx-auto mb-4" />
                                    <p className="text-gray-500">No notifications yet</p>
                                </div>
                            )}
                        </div>
                    </main>
                </div>
            );
        }

        // --- App Wrapper to handle props ---
        function App() {
            // Function to handle navigation
            const navigateTo = (page) => {
                window.location.href = page;
            };

            // Set userRole here ('tenant' or 'landlord')
            // Change this to 'landlord' to see the landlord back link behavior
            const userRole = 'tenant'; 

            return <Notifications navigateTo={navigateTo} userRole={userRole} />;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
